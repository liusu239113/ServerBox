name: Flutter Build

on:
  workflow_dispatch:
    inputs:
      release:
        description: 'Create GitHub Release from the selected v1.0.<build> tag'
        required: false
        type: boolean
        default: false
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  APP_NAME: SurlorAI
  BUILD_TAG: test-build-${{ github.run_number }}-${{ github.sha }}
  FLUTTER_VERSION: "3.44.4"

jobs:
  reproducibilityCheck:
    name: Reproducibility check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          persist-credentials: false
          fetch-depth: 0
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - name: Require tagged releases
        if: inputs.release == true && github.ref_type != 'tag'
        shell: bash
        run: |
          echo "Release builds must be started from a committed tag so the source can be reproduced by downstream builders."
          echo "Create and push a v1.0.<build> tag after committing the release version files."
          exit 1
      - name: Check tag source version
        if: github.ref_type == 'tag'
        shell: bash
        run: |
          set -euo pipefail

          expected="${GITHUB_REF_NAME#v}"
          build="${expected##*.}"
          pub_version="$(sed -n -E 's/^version:[[:space:]]*([^+]+)\+([0-9]+)$/\1+\2/p' pubspec.yaml | head -n 1)"
          build_data="$(sed -n -E 's/.*static const int build = ([0-9]+);/\1/p' lib/data/res/build_data.dart | head -n 1)"

          if [[ "$pub_version" != "$expected+$build" ]]; then
            echo "pubspec.yaml version must match tag ${GITHUB_REF_NAME}; got ${pub_version}."
            exit 1
          fi

          if [[ "$build_data" != "$build" ]]; then
            echo "BuildData.build must match tag ${GITHUB_REF_NAME}; got ${build_data}."
            exit 1
          fi
      - name: Check locked dependencies
        shell: bash
        env:
          PUB_HOSTED_URL: https://pub.dev
        run: |
          flutter pub get --enforce-lockfile
          git diff --exit-code -- pubspec.yaml pubspec.lock
      - name: Check JNI build-id patch
        shell: bash
        run: scripts/release/patch-jni-build-id.sh

  buildAndroid:
    name: Build android
    needs: reproducibilityCheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          persist-credentials: false
          fetch-depth: 0
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "21"
      - name: Fetch secrets
        run: |
          curl --fail --show-error --location -u ${{ secrets.BASIC_AUTH }} -o android/app/app.key ${{ secrets.URL_PREFIX }}app.key
          curl --fail --show-error --location -u ${{ secrets.BASIC_AUTH }} -o android/key.properties ${{ secrets.URL_PREFIX }}key.properties
      - name: Patch JNI build-id
        run: |
          flutter pub get
          scripts/release/patch-jni-build-id.sh
      - name: Build (release)
        if: inputs.release == true || github.ref_type == 'tag'
        shell: bash
        run: dart run fl_build -bp -p android
      - name: Build (test)
        if: inputs.release != true && github.ref_type != 'tag'
        shell: bash
        run: dart run fl_build -p android
      - name: Rename
        shell: bash
        run: |
          cd build/app/outputs/flutter-apk
          for f in *_${BUILD_NUMBER}_*.apk; do
            mv "$f" "${f/_${BUILD_NUMBER}_/_v1.0.${BUILD_NUMBER}_}"
          done
          # Remove original APKs copied by fl_build
          rm -f app-*-release.apk
      - name: Upload artifacts
        if: inputs.release != true && github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ env.BUILD_TAG }}-android
          path: build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error
          retention-days: 14
      - name: Create Release
        if: inputs.release == true || github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ env.BUILD_NUMBER }}
          files: |
            build/app/outputs/flutter-apk/${{ env.APP_NAME }}_v1.0.${{ env.BUILD_NUMBER }}_arm64.apk
            build/app/outputs/flutter-apk/${{ env.APP_NAME }}_v1.0.${{ env.BUILD_NUMBER }}_arm.apk
            build/app/outputs/flutter-apk/${{ env.APP_NAME }}_v1.0.${{ env.BUILD_NUMBER }}_amd64.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  buildLinux:
    name: Build linux
    needs: reproducibilityCheck
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs_on: ubuntu-latest
            release_suffix: ""
            artifact_suffix: ""
          - runs_on: ubuntu-22.04
            release_suffix: "_legacy"
            artifact_suffix: "-legacy"
    runs-on: ${{ matrix.runs_on }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          persist-credentials: false
          fetch-depth: 0
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y clang cmake ninja-build pkg-config libgtk-3-dev mesa-utils libvulkan-dev desktop-file-utils wget
          sudo apt install -y libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev libunwind-dev libsecret-1-dev
      - name: Build (release)
        if: inputs.release == true || github.ref_type == 'tag'
        shell: bash
        run: dart run fl_build -bp -p linux
      - name: Build (test)
        if: inputs.release != true && github.ref_type != 'tag'
        shell: bash
        run: dart run fl_build -p linux
      - name: Rename
        shell: bash
        run: |
          for f in *_${BUILD_NUMBER}_*.AppImage; do
            mv "$f" "${f/_${BUILD_NUMBER}_/_v1.0.${BUILD_NUMBER}_}"
          done
      - name: Add legacy suffix
        if: matrix.release_suffix != ''
        shell: bash
        run: |
          mv "${APP_NAME}_v1.0.${BUILD_NUMBER}_amd64.AppImage" "${APP_NAME}_v1.0.${BUILD_NUMBER}${{ matrix.release_suffix }}_amd64.AppImage"
      - name: Upload artifacts
        if: inputs.release != true && github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ env.BUILD_TAG }}-linux${{ matrix.artifact_suffix }}
          path: "*.AppImage"
          if-no-files-found: error
          retention-days: 14
      - name: Create Release
        if: inputs.release == true || github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ env.BUILD_NUMBER }}
          files: |
            ${{ env.APP_NAME }}_v1.0.${{ env.BUILD_NUMBER }}${{ matrix.release_suffix }}_amd64.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  buildWindows:
    name: Build windows
    needs: reproducibilityCheck
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          persist-credentials: false
          fetch-depth: 0
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - name: Build (release)
        if: inputs.release == true || github.ref_type == 'tag'
        shell: bash
        run: dart run fl_build -bp -p windows
      - name: Build (test)
        if: inputs.release != true && github.ref_type != 'tag'
        shell: bash
        run: dart run fl_build -p windows
      - name: Rename
        shell: bash
        run: |
          for f in *_${BUILD_NUMBER}_*.zip; do
            mv "$f" "${f/_${BUILD_NUMBER}_/_v1.0.${BUILD_NUMBER}_}"
          done
      - name: Upload artifacts
        if: inputs.release != true && github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ env.BUILD_TAG }}-windows
          path: "*_windows_amd64.zip"
          if-no-files-found: error
          retention-days: 14
      - name: Create Release
        if: inputs.release == true || github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ env.BUILD_NUMBER }}
          files: |
            ${{ env.APP_NAME }}_v1.0.${{ env.BUILD_NUMBER }}_windows_amd64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
